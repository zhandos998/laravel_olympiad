services:
  app:
    build:
      context: .
      target: runtime
    image: laravel-olympiad-app:latest
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Laravel Olympiad}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8080}
      ASSET_URL: ${ASSET_URL:-}
      APP_LOCALE: ${APP_LOCALE:-rus}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-rus}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-olympiad}
      DB_USERNAME: ${DB_USERNAME:-olympiad}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      SESSION_CONNECTION: ${SESSION_CONNECTION:-default}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_CACHE_DB: ${REDIS_CACHE_DB:-1}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      FFMPEG_BINARY: ${FFMPEG_BINARY:-ffmpeg}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:8080}
    volumes:
      - laravel_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue-worker:
    image: laravel-olympiad-app:latest
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=1", "--timeout=1800"]
    environment:
      APP_NAME: ${APP_NAME:-Laravel Olympiad}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8080}
      ASSET_URL: ${ASSET_URL:-}
      APP_LOCALE: ${APP_LOCALE:-rus}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-rus}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-olympiad}
      DB_USERNAME: ${DB_USERNAME:-olympiad}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      SESSION_CONNECTION: ${SESSION_CONNECTION:-default}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_CACHE_DB: ${REDIS_CACHE_DB:-1}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      FFMPEG_BINARY: ${FFMPEG_BINARY:-ffmpeg}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:8080}
    volumes:
      - laravel_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started

  nginx:
    build:
      context: .
      target: nginx
    image: laravel-olympiad-nginx:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    depends_on:
      app:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-olympiad}
      POSTGRES_USER: ${DB_USERNAME:-olympiad}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

volumes:
  laravel_storage:
  postgres_data:
  redis_data:
